<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Alerty pogodowe</title>

<style>
/* (CSS bez zmian – zostawiam dokładnie Twój) */
:root {
    --bg: #0b5f6d;
    --card: rgba(255,255,255,0.92);
    --error: #e63946;
    --ok: #2a9d8f;
    --danger: #c1121f;
    --neutral: #64748b;
    --text: #0f172a;
}
* { box-sizing: border-box; font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif; }
body { margin: 0; min-height: 100vh; background: var(--bg); overflow: hidden; }
.weather-bg::before,
.weather-bg::after {
    content: "";
    position: absolute;
    inset: -20%;
    background:
        radial-gradient(circle at 20% 30%, #ffffff 0 40px, transparent 41px),
        radial-gradient(circle at 60% 20%, #ffffff 0 55px, transparent 56px),
        radial-gradient(circle at 80% 70%, #ffffff 0 45px, transparent 46px),
        linear-gradient(#ffd000 0 0);
    background-repeat: no-repeat;
    animation: moveClouds 60s linear infinite;
    opacity: 0.9;
}
.weather-bg::after { animation-duration: 90s; opacity: 0.6; }
@keyframes moveClouds { from { transform: translateX(0); } to { transform: translateX(-20%); } }

.lightning {
    position: absolute;
    width: 12px;
    height: 30px;
    background: #ffd000;
    clip-path: polygon(50% 0, 65% 40%, 45% 40%, 60% 100%, 35% 55%, 55% 55%);
    animation: flash 6s infinite;
    opacity: 0;
}
.lightning:nth-child(1) { left: 10%; top: 70%; }
.lightning:nth-child(2) { left: 85%; top: 20%; animation-delay: 2s; }
@keyframes flash { 0%,95%,100%{opacity:0;} 96%,97%{opacity:1;} }

.container { position: relative; z-index: 1; min-height: 100vh; display: grid; place-items: center; padding: 24px; }
.card { background: var(--card); padding: 32px; border-radius: 20px; width: 100%; max-width: 420px; box-shadow: 0 20px 50px rgba(0,0,0,0.25); }
h1 { margin: 0 0 24px; font-size: clamp(1.6rem, 5vw, 2rem); text-align: center; color: var(--text); }
input { width: 100%; padding: 14px 16px; font-size: 1rem; border-radius: 10px; border: 2px solid #cbd5e1; outline: none; }
input.error { border-color: var(--error); color: var(--error); }
.error-text { margin-top: 6px; font-size: 0.9rem; color: var(--error); display: none; }
.buttons { display: grid; gap: 12px; margin-top: 20px; }
button { padding: 14px; font-size: 1rem; border-radius: 10px; border: none; cursor: pointer; font-weight: 600; color: white; }
button:disabled { opacity: 0.6; cursor: not-allowed; }
.subscribe { background: var(--ok); }
.unsubscribe { background: var(--danger); }
.ping { background: var(--neutral); }
.spinner { width: 36px; height: 36px; border: 4px solid #ddd; border-top-color: var(--ok); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto; }
@keyframes spin { to { transform: rotate(360deg); } }
.status { text-align: center; font-size: 1rem; color: var(--text); }
</style>
</head>

<body>
<div class="weather-bg"></div>
<div class="lightning"></div>
<div class="lightning"></div>

<div class="container">
<div class="card">

<h1>Alerty pogodowe</h1>

<div id="form">
    <input id="email" type="email" placeholder="wpisz e-mail">
    <div id="error" class="error-text">Niepoprawny adres e-mail</div>

    <div class="buttons">
        <button id="sub" class="subscribe" disabled>Subskrybuj</button>
        <button id="unsub" class="unsubscribe" disabled>Wycofaj subskrypcję</button>
        <button id="ping" class="ping">Test połączenia</button>
    </div>
</div>

<div id="status" class="status" style="display:none"></div>

</div>
</div>

<script>
const API_BASE = "https://weatheralerts-eefkdachhtdeechp.westeurope-01.azurewebsites.net";

const email = document.getElementById("email");
const error = document.getElementById("error");
const sub = document.getElementById("sub");
const unsub = document.getElementById("unsub");
const ping = document.getElementById("ping");
const form = document.getElementById("form");
const status = document.getElementById("status");

const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

email.oninput = () => {
    const ok = regex.test(email.value.trim());
    error.style.display = ok || !email.value ? "none" : "block";
    sub.disabled = !ok;
    unsub.disabled = !ok;
};

async function send(endpoint, successText) {
    form.style.display = "none";
    status.style.display = "block";
    status.innerHTML = '<div class="spinner"></div>';

    try {
        const res = await fetch(API_BASE + endpoint, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email: email.value.trim() })
        });

        if (res.status === 200 || res.status === 202) {
            status.textContent = successText;
            return;
        }

        const data = await res.json().catch(() => null);

        if (res.status === 400 && data?.error) {
            throw data.error;
        }

        throw "server";
    }
    catch (e) {
        status.textContent =
            typeof e === "string"
                ? e
                : "Błąd serwera. Spróbuj ponownie.";

        setTimeout(() => {
            status.style.display = "none";
            form.style.display = "block";
        }, 2500);
    }
}

sub.onclick = () =>
    send(
        "/api/requestSubscription",
        "Prośba o subskrypcję została wysłana. Sprawdź e-mail."
    );

unsub.onclick = () =>
    send(
        "/api/requestUnsubscription",
        "Prośba o wycofanie subskrypcji została wysłana. Sprawdź e-mail."
    );

ping.onclick = async () => {
    status.style.display = "block";
    status.innerHTML = '<div class="spinner"></div>';

    try {
        const res = await fetch(API_BASE + "/api/ping");
        const txt = await res.text();
        status.textContent = "PING OK: " + txt;
    } catch {
        status.textContent = "PING FAILED";
    }
};
</script>
</body>
</html>
